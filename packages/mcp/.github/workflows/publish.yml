name: Publish to npm

on:
  push:
    branches:
      - main
    paths:
      - 'packages/mcp/**'
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type (patch/minor/major)'
        required: false
        default: 'patch'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: packages/mcp/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: packages/mcp

      - name: Build
        run: npm run build
        working-directory: packages/mcp

      - name: Bump version
        id: version
        run: |
          cd packages/mcp
          if [ "${{ github.event.inputs.bump }}" != "" ]; then
            BUMP_TYPE=${{ github.event.inputs.bump }}
          else
            # Auto bump based on conventional commits
            BUMP_TYPE=patch
          fi
          npm version $BUMP_TYPE --no-git-tag-version
          echo "NEW_VERSION=$(node -p \"require('./package.json').version\")" >> $GITHUB_OUTPUT
        working-directory: packages/mcp

      - name: Commit and push version bump
        run: |
          cd packages/mcp
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git commit -m "chore(mcp): bump version to ${{ steps.version.outputs.NEW_VERSION }}"
          git tag mcp-v${{ steps.version.outputs.NEW_VERSION }}
          git push origin HEAD:main --tags
        working-directory: packages/mcp

      - name: Publish to npm
        run: npm publish --access public
        working-directory: packages/mcp
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
