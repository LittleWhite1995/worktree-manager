name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Tests (Node + Rust)
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache npm downloads
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('package.json') }}
          restore-keys: npm-${{ runner.os }}-

      - name: Install frontend dependencies
        run: npm install

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Check i18n keys
        run: npm run check-i18n

      - name: Verify command contracts
        run: npm run verify:contracts

      - name: Run frontend tests
        run: npm test

      - name: Build frontend assets
        run: npm run build

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          cache-on-failure: true
          shared-key: ci

      - name: Install system dependencies (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config patchelf \
            libgtk-3-dev librsvg2-dev libayatana-appindicator3-dev \
            libwebkit2gtk-4.1-dev \
            libsoup-3.0-dev || sudo apt-get install -y --no-install-recommends libsoup2.4-dev

      - name: Run Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml
